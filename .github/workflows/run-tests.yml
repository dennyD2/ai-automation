name: AI Agentic Test Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override BASE_URL (leave blank to use default)'
        required: false
        default: ''
      excel_path:
        description: 'Override EXCEL_PATH (leave blank to use default)'
        required: false
        default: ''

jobs:
  test:
    runs-on: self-hosted        # site is on a private network — must run locally

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl playwright
          python -m playwright install chromium --with-deps

      - name: Run Tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BASE_URL:   ${{ github.event.inputs.base_url   || '' }}
          EXCEL_PATH: ${{ github.event.inputs.excel_path || '' }}
        run: python run_tests.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/
