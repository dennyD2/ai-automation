name: AI Agentic Test Runner — Sagility Production Monitor

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */2 * * *'   # run every 2 hours for production monitoring
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl playwright python-docx
          python -m playwright install chromium --with-deps

      - name: Run Tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
          FLOW_DOC_PATH:    "Flow document.docx"   # path to your flow doc in repo
          # BASE_URL:       override if needed
        run: python run_tests.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/
          retention-days: 30
