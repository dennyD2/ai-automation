name: AI No-Code Test Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  browser-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          # Pinning versions to ensure 'ainvoke' and 'provider' compatibility
          pip install pandas openpyxl playwright 
          pip install browser-use==0.1.34 langchain-openai==0.1.1 langchain-core==0.2.0
          python -m playwright install chromium --with-deps

      - name: Run Test Suite
        env:
          # Ensure this secret is added in GitHub Repo Settings
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -c "
          import asyncio
          import os
          import pandas as pd
          from browser_use import Agent
          from langchain_openai import ChatOpenAI
          
          async def run_suite():
              try:
                  # Use engine='openpyxl' for .xlsx compatibility
                  df = pd.read_excel('Trajector Test cases.xlsx', sheet_name='Login', engine='openpyxl')
              except Exception as e:
                  print(f'Error reading Excel: {e}')
                  return
          
              # Initialize LLM with DeepSeek endpoint
              llm = ChatOpenAI(
                  model='deepseek-chat',
                  openai_api_base='https://api.deepseek.com/v1',
                  openai_api_key=os.getenv('DEEPSEEK_API_KEY')
              )
              
              # Use direct dictionary injection to bypass Pydantic field validation
              # browser-use requires this 'provider' attribute to be set to 'openai'
              llm.__dict__['provider'] = 'openai'
              
              for index, row in df.iterrows():
                  # Assume the first column contains the test instruction/task
                  instruction = str(row.iloc[0])
                  if not instruction or instruction.strip().lower() in ['nan', 'none', '']:
                      continue
                      
                  print(f'\n--- Running Test Case {index + 1}: {instruction} ---')
                  
                  try:
                      # Initialize the AI Agent
                      agent = Agent(task=instruction, llm=llm)
                      # Execute the browser automation
                      await agent.run()
                  except Exception as e:
                      print(f'Test Case {index + 1} Failed with error: {str(e)}')
                      # Log object type if it still fails to find 'ainvoke'
                      if 'ainvoke' in str(e):
                          print(f'DEBUG: LLM Class is {type(llm)}')
          
          if __name__ == '__main__':
              asyncio.run(run_suite())
          "
