name: AI No-Code Test Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  browser-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pandas openpyxl browser-use langchain-openai playwright
          # Use 'python -m' to ensure the runner finds the playwright executable
          python -m playwright install chromium --with-deps

      - name: Run Test Suite
        env:
          # Make sure you add DEEPSEEK_API_KEY to your GitHub Repo Secrets
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -c "
          import asyncio
          import os
          import pandas as pd
          from browser_use import Agent
          from langchain_openai import ChatOpenAI
          
          async def run_suite():
              try:
                  # Reading the Excel file
                  df = pd.read_excel('Trajector Test cases.xlsx', sheet_name='Login', engine='openpyxl')
              except Exception as e:
                  print(f'Error reading sheet: {e}')
                  return
          
              # Initialize LLM with DeepSeek Base URL
              llm = ChatOpenAI(
                  model='deepseek-chat',
                  openai_api_base='https://api.deepseek.com',
                  api_key=os.getenv('DEEPSEEK_API_KEY')
              )
              
              # CRITICAL FIX: Manually inject the provider attribute
              # This prevents the AttributeError: 'ChatOpenAI' object has no attribute 'provider'
              llm.provider = 'openai'
              
              for index, row in df.iterrows():
                  instruction = str(row.iloc[0])
                  if not instruction or instruction.strip().lower() == 'nan':
                      continue
                      
                  print(f'\n--- Running Test Case {index + 1}: {instruction} ---')
                  try:
                      agent = Agent(task=instruction, llm=llm)
                      await agent.run()
                  except Exception as e:
                      print(f'Test Case {index + 1} Failed: {e}')
          
          if __name__ == '__main__':
              asyncio.run(run_suite())
          "
