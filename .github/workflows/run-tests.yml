name: Test Sagility Flow check 

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Which company to test'
        required: true
        default: 'sagility'
        type: choice
        options:
          - sagility
          - trajector
      environment:
        description: 'Environment'
        required: true
        default: 'DEV'
        type: choice
        options:
          - QA
          - DEV
          - PROD
      role_type:
        description: 'Role Type'
        required: true
        default: 'voice'
        type: choice
        options:
          - voice
          - non_voice
      headless:
        description: 'Run browser in headless mode'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 */6 * * *'

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'QA' }}
      HEADLESS: ${{ github.event.inputs.headless || 'true' }}
      COMPANY: ${{ github.event.inputs.company || 'sagility' }}
      ROLE_TYPE: ${{ github.event.inputs.role_type || 'voice' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Display Runtime Configuration
        run: |
          echo "Company      : $COMPANY"
          echo "Environment  : $ENVIRONMENT"
          echo "Headless     : $HEADLESS"
          echo "Role Type    : $ROLE_TYPE"

      - name: Set Portal URL
        shell: bash
        run: |
          PORTAL_URL=$(python <<EOF
          from configs.config_sagility import URLS
          import os
      
          env = os.getenv("ENVIRONMENT", "QA")
          role = os.getenv("ROLE_TYPE", "voice")
      
          if env == "QA":
              print(URLS["QA"][role])
          else:
              print(URLS[env])
      
          EOF
          )
          echo "PORTAL_URL=$PORTAL_URL" >> $GITHUB_ENV

      - name: Run Automation                    
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PYTHONIOENCODING: utf-8  
          PYTHONUTF8: 1           
          HEADLESS: ${{ github.event.inputs.headless }}
        run: |
          python -m flow.${{ github.event.inputs.company || 'sagility' }}.application

      - name: Upload Artifacts                  
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.event.inputs.company || 'sagility' }}
          path: artifacts/
          retention-days: 30
