name: AI No-Code Test Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  browser-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pandas openpyxl playwright browser-use langchain-openai langchain-core
          python -m playwright install chromium --with-deps

      - name: Run Test Suite
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -c "
          import asyncio
          import os
          import pandas as pd
          from browser_use import Agent
          from langchain_openai import ChatOpenAI
          
          async def run_suite():
              try:
                  df = pd.read_excel('Trajector Test cases.xlsx', sheet_name='Login', engine='openpyxl')
              except Exception as e:
                  print(f'Error reading sheet: {e}')
                  return
          
              # Updated initialization for DeepSeek compatibility
              llm = ChatOpenAI(
                  model='deepseek-chat',
                  base_url='https://api.deepseek.com/v1',
                  api_key=os.getenv('DEEPSEEK_API_KEY')
              )
              
              # Use a safer method to set the provider attribute
              # This avoids Pydantic validation while satisfying browser-use requirements
              setattr(llm, 'provider', 'openai')
              
              for index, row in df.iterrows():
                  instruction = str(row.iloc[0])
                  if not instruction or instruction.strip().lower() == 'nan':
                      continue
                      
                  print(f'\n--- Running Test Case {index + 1}: {instruction} ---')
                  try:
                      # browser-use expects 'ainvoke', which newer LangChain versions 
                      # provide via the BaseChatModel inheritance. 
                      agent = Agent(task=instruction, llm=llm)
                      await agent.run()
                  except Exception as e:
                      print(f'Test Case {index + 1} Failed: {e}')
          
          if __name__ == '__main__':
              asyncio.run(run_suite())
          "
