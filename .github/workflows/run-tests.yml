name: AI No-Code Test Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  browser-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          # Letting pip find the best compatible versions
          pip install pandas openpyxl playwright browser-use langchain-openai
          python -m playwright install chromium --with-deps

      - name: Run Test Suite
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -c "
          import asyncio
          import os
          import pandas as pd
          from browser_use import Agent
          from langchain_openai import ChatOpenAI
          
          async def run_suite():
              try:
                  df = pd.read_excel('Trajector Test cases.xlsx', sheet_name='Login', engine='openpyxl')
              except Exception as e:
                  print(f'Error reading Excel: {e}')
                  return
          
              # Using the version 0.3.x compatible initialization
              llm = ChatOpenAI(
                  model='deepseek-chat',
                  base_url='https://api.deepseek.com/v1',
                  api_key=os.getenv('DEEPSEEK_API_KEY')
              )
              
              # Direct dictionary injection to bypass Pydantic 'no field' error
              # This satisfies browser-use without triggering Pydantic validation
              llm.__dict__['provider'] = 'openai'
              
              for index, row in df.iterrows():
                  instruction = str(row.iloc[0])
                  if not instruction or instruction.strip().lower() in ['nan', 'none', '']:
                      continue
                      
                  print(f'\n--- Running Test Case {index + 1}: {instruction} ---')
                  
                  try:
                      # With langchain-openai 0.3.1+, ainvoke is natively supported
                      agent = Agent(task=instruction, llm=llm)
                      await agent.run()
                  except Exception as e:
                      print(f'Test Case {index + 1} Failed: {str(e)}')
          
          if __name__ == '__main__':
              asyncio.run(run_suite())
          "
