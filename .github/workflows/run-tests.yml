- name: Execute Tests from Excel
        env:
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: "https://api.deepseek.com/v1"
        run: |
          python -c "
          import asyncio
          import pandas as pd
          # FIXED IMPORT: We use the browser_use version of ChatOpenAI
          from browser_use import Agent, ChatOpenAI

          async def run_suite():
              try:
                  df = pd.read_excel('Trajector Test cases.xlsx', sheet_name='Login', engine='openpyxl')
              except Exception as e:
                  print(f'Error reading sheet: {e}')
                  return

              # FIXED INITIALIZATION: DeepSeek uses the standard ChatOpenAI wrapper here
              llm = ChatOpenAI(model='deepseek-chat')
              
              for index, row in df.iterrows():
                  instruction = str(row.iloc[0])
                  if not instruction or instruction.strip().lower() == 'nan':
                      continue
                      
                  print(f'🚀 Running Test Case {index + 1}: {instruction}')
                  try:
                      agent = Agent(task=instruction, llm=llm)
                      await agent.run()
                  except Exception as e:
                      print(f'❌ Test Case {index + 1} Failed: {e}')

          if __name__ == '__main__':
              asyncio.run(run_suite())
          "
